name: "✨ Feature Request"
description: Suggest a new feature or enhancement for DirektDSP_GUI
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve DirektDSP_GUI? We'd love to hear it!
        Please describe the feature and its motivation clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is this feature request related to a problem? Describe it.
      placeholder: I'm always frustrated when …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the library does this feature relate to?
      options:
        - Core / BaseEditor
        - Layout (Section / FlexContainer / TabPanel)
        - Controls (Knob / Toggle / ComboBox)
        - Display (Meter / Label)
        - Chrome (Header / Footer / PopupPanel / PresetBrowser)
        - Theme (LookAndFeel / Colours)
        - Config / Descriptors
        - Build / CMake
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
